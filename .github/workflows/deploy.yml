name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i "s|https://specimen-worker.YOURNAME.workers.dev|${{ secrets.WORKER_URL }}|g" index.html upload.html
          sed -i "s|TURNSTILE_SITE_KEY_PLACEHOLDER|${{ secrets.TURNSTILE_SITE_KEY }}|g" upload.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,worker'
